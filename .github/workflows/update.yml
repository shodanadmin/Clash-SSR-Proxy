name: Daily Update

permissions:
  contents: write

on:
  schedule:
    - cron: '0 8 * * *'  
  workflow_dispatch:  

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Update timestamp
        run: |
          # 获取当前UTC时间（格式：2026-02-07 08:00）
          CURRENT_TIME=$(date -u +"%Y-%m-%d %H:%M")
          
          # 更新README中的时间戳（匹配你的格式）
          sed -i "s/> \\*\\*最后更新\\*\\*：.*$/> **最后更新**：${CURRENT_TIME} UTC | 每日更新价格和优惠码/" README.md
          
      - name: Commit and push
        run: |
          git config user.name "GitHub Action"
          git config user.email "44976487+jichangvps@users.noreply.github.com"
          git add README.md
          git commit -m "🔄 Auto update: $(date +%Y-%m-%d) 价格和优惠码时间戳" || exit 0
          git push
